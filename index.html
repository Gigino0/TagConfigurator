<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dial — Configuratore Tag</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Stencil:wght@400;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Great+Vibes&family=Playfair+Display:wght@600;700&family=Caveat:wght@500;700&family=Oswald:wght@500;700&family=Quicksand:wght@500;700&family=Cinzel:wght@600;700&family=Permanent+Marker&family=Pinyon+Script&family=Parisienne&family=Baloo+2:wght@700&family=Fredoka:wght@600&family=Bungee&family=Bangers&family=Courier+Prime:wght@400;700&family=Special+Elite&family=Rye&family=Sancreek&family=UnifrakturMaguntia&family=MedievalSharp&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/opentype.js/1.3.4/opentype.min.js"></script>
<style>
:root{
  --bg:#131210; --bg-2:#1c1a17; --panel:#1f1d19; --panel-2:#252220; --line:#38352f;
  --steel-1:#e9e7e1; --steel-2:#b8b5aa; --steel-3:#6f6c62; --ink:#141310;
  --ember:#ff5a2e; --ember-dim:#7a2c17; --brass:#c69a3b;
  --text-1:#efece5; --text-2:#a7a297; --text-3:#6f6b60;
  --font-display:'Big Shoulders Stencil', sans-serif; --font-body:'Inter', sans-serif; --font-mono:'JetBrains Mono', monospace;
}
*{box-sizing:border-box;}
body{ margin:0; background:var(--bg); color:var(--text-1); font-family:var(--font-body); -webkit-font-smoothing:antialiased; }
.app{ max-width:1100px; margin:0 auto; padding:26px 24px 60px; }
.topbar{ display:flex; align-items:center; justify-content:space-between; padding-bottom:20px; border-bottom:1px solid var(--line); margin-bottom:8px; }
.brand{ display:flex; align-items:baseline; gap:10px; }
.brand-mark{ font-family:var(--font-display); font-weight:700; font-size:22px; letter-spacing:0.02em; }
.brand-sub{ font-family:var(--font-mono); font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-3); }
.steps{ display:flex; gap:2px; font-family:var(--font-mono); font-size:11px; letter-spacing:0.04em; }
.topbar-right{ display:flex; align-items:center; gap:18px; }
.save-indicator{ font-family:var(--font-mono); font-size:10.5px; color:var(--steel-2); text-transform:uppercase; letter-spacing:0.05em; opacity:0; transition:opacity .3s; }
.save-indicator.visible{ opacity:1; }
.new-project-link{ font-family:var(--font-mono); font-size:10.5px; color:var(--text-3); text-transform:uppercase; letter-spacing:0.05em; cursor:pointer; }
.new-project-link:hover{ color:var(--ember); }
#deleteProjectLink:hover{ color:#ff4444; }
.project-select{ background:var(--panel-2); border:1px solid var(--line); color:var(--text-2); font-family:var(--font-mono); font-size:10.5px; text-transform:uppercase; letter-spacing:0.03em; padding:5px 8px; border-radius:2px; max-width:150px; }
.step-pill{ padding:7px 14px; color:var(--text-3); border-bottom:2px solid transparent; cursor:pointer; transition:color .15s; text-transform:uppercase; user-select:none; }
.step-pill:hover{ color:var(--text-2); }
.step-pill.active{ color:var(--ember); border-bottom-color:var(--ember); }
.step-pill.done{ color:var(--steel-2); }

.step-head{ text-align:center; padding:34px 0 6px; }
.step-num{ font-family:var(--font-mono); font-size:12px; color:var(--ember); letter-spacing:0.1em; margin-bottom:6px; }
.step-title{ font-family:var(--font-display); font-size:34px; font-weight:600; margin:0 0 8px; letter-spacing:0.01em; }
.step-sub{ font-size:14px; color:var(--text-2); margin:0 auto; max-width:440px; line-height:1.5; }

.step-scroll{ display:contents; }
.control-bar{ display:flex; justify-content:center; margin:22px 0 6px; }
.text-input-row{ display:flex; gap:0; width:100%; max-width:380px; }
.text-input{ flex:1; background:var(--panel-2); border:1px solid var(--line); border-right:none; color:var(--text-1); font-family:var(--font-body); font-size:16px; padding:12px 14px; border-radius:2px 0 0 2px; resize:none; overflow:hidden; line-height:1.3; max-height:140px; }
.text-input:focus{ outline:none; border-color:var(--ember); }
.text-input-btn{ font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:0.04em; padding:0 18px; background:var(--ember); border:1px solid var(--ember); color:#1a0d06; cursor:pointer; border-radius:0 2px 2px 0; font-weight:500; }
.grid-toggle-row{ display:flex; align-items:center; justify-content:center; gap:10px; margin-top:26px; padding-top:16px; border-top:1px solid var(--line); font-size:12px; color:var(--text-2); font-family:var(--font-mono); text-transform:uppercase; letter-spacing:0.04em; }

.cat-tabs{ display:flex; flex-wrap:wrap; gap:6px; justify-content:center; max-width:560px; margin:0 auto 14px; }
.cat-tab{ font-family:var(--font-mono); font-size:10.5px; text-transform:uppercase; letter-spacing:0.03em; padding:6px 11px; border:1px solid var(--line); border-radius:2px; color:var(--text-2); cursor:pointer; background:var(--panel-2); }
.cat-tab:hover{ border-color:var(--steel-3); }
.cat-tab.active{ border-color:var(--ember); color:var(--ember); }
.icon-grid{ display:grid; grid-template-columns:repeat(6,1fr); gap:7px; max-width:420px; margin:0 auto 10px; max-height:260px; overflow-y:auto; padding:4px 6px 4px 0; }
.icon-grid::-webkit-scrollbar{ width:6px; }
.icon-grid::-webkit-scrollbar-thumb{ background:var(--line); border-radius:3px; }
.icon-grid::-webkit-scrollbar-track{ background:transparent; }
.icon-card{ aspect-ratio:1; border:1px solid var(--line); border-radius:3px; background:var(--panel-2); display:flex; align-items:center; justify-content:center; cursor:pointer; }
.icon-card:hover{ border-color:var(--ember); }
.icon-card svg{ width:20px; height:20px; stroke:var(--text-1); fill:none; }
.icon-card.glyph{ font-size:16px; color:var(--text-1); }

.orbit-wrap{ position:relative; width:100%; max-width:1040px; height:960px; margin:10px auto 0; }
.orbit-wrap::before{ content:''; position:absolute; left:50%; top:0; bottom:0; width:1px; background:rgba(255,90,46,0.2); pointer-events:none; z-index:1; }
.orbit-wrap::after{ content:''; position:absolute; top:56%; left:0; right:0; height:1px; background:rgba(255,90,46,0.2); pointer-events:none; z-index:1; }
.tag-center{ position:absolute; left:50%; top:56%; transform:translate(-50%,-50%); width:520px; display:flex; flex-direction:column; align-items:center; gap:14px; z-index:2; }
.tag-wrap{ width:480px; height:480px; transform-origin:center center; touch-action:none; }
.tag-wrap svg{ cursor:grab; }
.tag-wrap svg.panning{ cursor:grabbing; }
.tag-wrap svg{ width:100%; height:100%; overflow:visible; }
.stage-readout{ display:flex; gap:14px; font-family:var(--font-mono); font-size:9.5px; letter-spacing:0.04em; color:var(--text-3); text-transform:uppercase; }
.stage-readout b{ color:var(--steel-2); font-weight:500; }

.drag-el{ cursor:grab; touch-action:none; }
.drag-el:active{ cursor:grabbing; }
.drag-el.selected .sel-box{ opacity:1; }
.sel-box{ opacity:0; transition:opacity .1s; }
.warn-box{ opacity:0; pointer-events:none; }
.drag-el.warn .warn-box{ opacity:0.85; animation:warnPulse 1.4s ease-in-out infinite; }
@keyframes warnPulse{ 0%,100%{ opacity:0.5; } 50%{ opacity:1; } }
.bounds-warning{ display:none; max-width:600px; margin:0 auto 4px; padding:9px 16px; background:rgba(255,46,46,0.1); border:1px solid rgba(255,46,46,0.4); border-radius:3px; color:#ff8080; font-size:12px; text-align:center; font-family:var(--font-mono); letter-spacing:0.02em; }
.bounds-warning.visible{ display:block; }
.warn-ignore-link{ text-decoration:underline; cursor:pointer; margin-left:8px; text-transform:uppercase; letter-spacing:0.04em; opacity:0.85; }
.warn-ignore-link:hover{ opacity:1; }
.handle{ opacity:0; pointer-events:none; }
.drag-el.selected .handle{ opacity:1; pointer-events:auto; }
.rotate-line{ stroke:var(--steel-2); stroke-width:1.3; }
.rotate-handle{ fill:var(--steel-2); cursor:grab; }
.rotate-handle:active{ cursor:grabbing; }
.resize-handle{ fill:var(--steel-2); cursor:nwse-resize; }
@keyframes placeFlash{
  0%{ filter: brightness(1) drop-shadow(0 0 0 rgba(255,255,255,0)); }
  30%{ filter: brightness(2.6) drop-shadow(0 0 8px rgba(255,255,255,0.9)); }
  100%{ filter: brightness(1) drop-shadow(0 0 0 rgba(255,255,255,0)); }
}
.just-placed{ animation: placeFlash 0.6s ease-out; }

.completion-view{ display:none; flex-direction:column; align-items:center; padding:60px 20px 40px; text-align:center; animation:completionFadeIn .5s ease-out; }
.completion-view.visible{ display:flex; }
@keyframes completionFadeIn{ from{ opacity:0; transform:translateY(12px); } to{ opacity:1; transform:translateY(0); } }
.completion-tag{ width:400px; height:400px; margin-bottom:30px; filter:drop-shadow(0 20px 40px rgba(0,0,0,0.5)); }
.completion-tag svg{ width:100%; height:100%; overflow:visible; }
.completion-title{ font-family:var(--font-display); font-size:36px; font-weight:600; margin:0 0 8px; }
.completion-sub{ font-size:14px; color:var(--text-2); margin:0 0 30px; }
.completion-actions{ display:flex; gap:10px; }

.order-form{ display:flex; flex-direction:column; gap:10px; width:100%; max-width:380px; margin:0 0 22px; text-align:left; }
.order-form label{ font-family:var(--font-mono); font-size:10.5px; letter-spacing:0.04em; text-transform:uppercase; color:var(--text-2); margin-bottom:4px; display:block; }
.order-form input{ width:100%; background:var(--panel-2); border:1px solid var(--line); color:var(--text-1); font-family:var(--font-body); font-size:15px; padding:11px 13px; border-radius:2px; box-sizing:border-box; }
.order-form input:focus{ outline:none; border-color:var(--ember); }
.order-status{ font-size:13px; margin-top:4px; min-height:18px; }
.order-status.error{ color:#ff6b5a; }
.order-status.success{ color:#7fd88f; }
.order-divider{ width:100%; max-width:380px; border:none; border-top:1px solid var(--line); margin:4px 0 20px; }

.hole-toggle{ display:flex; align-items:center; gap:10px; font-size:12.5px; color:var(--text-2); background:var(--panel); border:1px solid var(--line); padding:8px 14px; border-radius:20px; }
.switch{ width:34px; height:19px; background:var(--panel-2); border:1px solid var(--line); border-radius:12px; position:relative; cursor:pointer; flex-shrink:0; }
.switch.on{ background:var(--ember-dim); border-color:var(--ember); }
.switch .knob{ width:13px; height:13px; background:var(--text-2); border-radius:50%; position:absolute; top:2px; left:2px; transition:left .15s, background .15s; }
.switch.on .knob{ left:17px; background:var(--ember); }

.orbit-item{ position:absolute; width:150px; z-index:3; }
#orbitItemsList{ position:absolute; inset:0; }
.shape-card{ border:1px solid var(--line); border-radius:3px; padding:14px 8px 10px; background:var(--panel-2); cursor:pointer; text-align:center; transition:border-color .12s, transform .12s; }
.shape-card:hover{ border-color:var(--steel-3); transform:translateY(-2px); }
.shape-card.active{ border-color:var(--ember); }
.shape-card svg{ width:44px; height:44px; }
.shape-card .name{ font-size:10.5px; color:var(--text-2); margin-top:6px; font-family:var(--font-mono); text-transform:uppercase; letter-spacing:0.03em; }

.shape-row{ display:flex; justify-content:center; gap:12px; flex-wrap:wrap; max-width:640px; margin:0 auto; }
.shape-card-row{ border:1px solid var(--line); border-radius:3px; padding:14px 16px 10px; background:var(--panel-2); cursor:pointer; text-align:center; transition:border-color .12s, transform .12s; width:110px; }
.shape-card-row:hover{ border-color:var(--steel-3); transform:translateY(-2px); }
.shape-card-row.active{ border-color:var(--ember); }
.shape-card-row svg{ width:40px; height:40px; }
.shape-card-row .name{ font-size:10.5px; color:var(--text-2); margin-top:6px; font-family:var(--font-mono); text-transform:uppercase; letter-spacing:0.03em; }

.satellite{ background:var(--panel); border:1px solid var(--line); border-radius:4px; padding:0; overflow:hidden; transition:box-shadow .15s, border-color .15s; }
.satellite.unplaced{ border-color:var(--ember); box-shadow:0 0 0 1px var(--ember-dim); }
.sat-preview-drag{ display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; background:var(--panel-2); border-bottom:1px dashed var(--steel-3); padding:12px 8px; cursor:grab; touch-action:none; min-height:54px; }
.sat-preview-drag:active{ cursor:grabbing; }
.sat-preview-text{ font-size:16px; color:var(--text-1); max-width:130px; max-height:70px; overflow:hidden; text-overflow:ellipsis; white-space:pre-line; text-align:center; line-height:1.15; }
.sat-preview-icon svg{ width:24px; height:24px; stroke:var(--text-1); fill:none; }
.sat-preview-icon .glyph{ font-size:20px; color:var(--text-1); }
.sat-drag-label{ font-family:var(--font-mono); font-size:8.5px; text-transform:uppercase; letter-spacing:0.04em; color:var(--text-3); }
.sat-controls{ padding:9px 10px 10px; }
.sat-text-input{ width:100%; background:var(--panel-2); border:1px solid var(--line); color:var(--text-1); font-family:var(--font-body); font-size:16px; padding:6px 7px; border-radius:2px; margin-bottom:7px; resize:vertical; min-height:32px; line-height:1.3; }
.sat-select{ width:100%; background:var(--panel-2); border:1px solid var(--line); color:var(--text-1); font-family:var(--font-body); font-size:11px; padding:6px 6px; border-radius:2px; margin-bottom:7px; }
.sat-fill-toggle{ display:flex; border:1px solid var(--line); border-radius:2px; overflow:hidden; margin-bottom:7px; }
.sat-fill-toggle button{ flex:1; background:var(--panel-2); border:none; color:var(--text-3); font-family:var(--font-mono); font-size:9.5px; text-transform:uppercase; padding:6px 2px; cursor:pointer; }
.sat-fill-toggle button.active{ background:var(--ember-dim); color:var(--ember); }
.sat-row{ display:flex; align-items:center; justify-content:center; gap:6px; margin-bottom:8px; }
.sat-align{ display:flex; gap:6px; margin-bottom:8px; }
.sat-align button{ flex:1; background:var(--panel-2); border:1px solid var(--line); color:var(--text-3); font-family:var(--font-mono); font-size:9.5px; text-transform:uppercase; padding:6px 2px; cursor:pointer; border-radius:2px; }
.sat-align button:hover:not(:disabled){ border-color:var(--steel-3); color:var(--text-1); }
.sat-align button:disabled{ opacity:0.35; cursor:default; }
.sat-actions{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
.sat-size{ display:flex; align-items:center; gap:6px; }
.sat-size button{ width:22px; height:22px; border:1px solid var(--line); background:var(--panel-2); color:var(--text-2); cursor:pointer; border-radius:2px; font-size:13px; line-height:1; }
.sat-size button:hover{ border-color:var(--steel-3); color:var(--text-1); }
.sat-size span{ font-family:var(--font-mono); font-size:10.5px; color:var(--text-3); min-width:22px; text-align:center; }
.sat-del{ font-family:var(--font-mono); font-size:10px; text-transform:uppercase; color:var(--text-3); cursor:pointer; }
.sat-del:hover{ color:var(--ember); }
.sat-dup{ font-family:var(--font-mono); font-size:10px; text-transform:uppercase; color:var(--text-3); cursor:pointer; }
.sat-dup:hover{ color:var(--steel-1); }
.floating-clone{ position:fixed; z-index:999; pointer-events:none; opacity:0.92; background:var(--panel-2); border:1.5px solid var(--ember); border-radius:4px; display:flex; align-items:center; justify-content:center; box-sizing:border-box; overflow:hidden; }
.floating-clone .sat-preview-icon svg{ width:24px; height:24px; stroke:var(--text-1); fill:none; }
.floating-clone .sat-preview-icon .glyph{ font-size:20px; color:var(--text-1); }
.floating-clone .sat-preview-text{ font-size:15px; color:var(--text-1); white-space:pre-line; text-align:center; line-height:1.15; }

.nav-row{ display:flex; justify-content:center; gap:10px; margin-top:26px; }
.btn{ font-family:var(--font-mono); font-size:11.5px; letter-spacing:0.04em; text-transform:uppercase; padding:11px 22px; border-radius:2px; border:1px solid var(--line); background:transparent; color:var(--text-2); cursor:pointer; transition:all .12s; }
.btn:hover{ border-color:var(--steel-3); color:var(--text-1); }
.btn-primary{ background:var(--ember); border-color:var(--ember); color:#1a0d06; font-weight:500; }
.btn-primary:hover{ background:#ff6e46; border-color:#ff6e46; }
.btn:disabled{ opacity:0.3; cursor:default; pointer-events:none; }
.btn-undo{ padding:0; width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; transition:transform .18s ease, border-color .18s, background .18s; }
.btn-undo svg{ width:19px; height:19px; transition:transform .35s cubic-bezier(.34,1.56,.64,1); }
.btn-undo:hover:not(:disabled){ border-color:var(--ember); background:rgba(255,90,46,0.08); transform:scale(1.08); }
.btn-undo:hover:not(:disabled) svg{ transform:rotate(-25deg); }
.btn-undo:active:not(:disabled){ transform:scale(0.92) rotate(-15deg); }
.empty-hint{ font-size:12px; color:var(--text-3); text-align:center; }

/* --- Blocco rotazione: mostrato solo su touch screen in verticale --- */
.rotate-gate{
  display:none; position:fixed; inset:0; z-index:9999;
  background:var(--bg); flex-direction:column; align-items:center; justify-content:center;
  gap:22px; text-align:center; padding:20px;
}
@media (orientation:portrait) and (pointer:coarse){
  .rotate-gate{ display:flex; }
}
.rotate-gate-icon{ width:74px; height:74px; color:var(--ember); animation:rotateHint 1.8s ease-in-out infinite; }
.rotate-gate-icon svg{ width:100%; height:100%; }
@keyframes rotateHint{ 0%,20%{ transform:rotate(0deg); } 50%,70%{ transform:rotate(90deg); } 100%{ transform:rotate(90deg); } }
.rotate-gate-text{ font-family:var(--font-mono); font-size:13.5px; letter-spacing:0.03em; color:var(--text-2); text-transform:uppercase; line-height:1.7; max-width:260px; }

/* --- Layout mobile: telefono in orizzontale (touch screen, larghezza limitata) --- */
@media (pointer:coarse) and (max-width:980px){
  html, body{ height:100%; }
  .app{
    padding:6px 12px 8px;
    height:100vh; height:100dvh; max-height:100vh; max-height:100dvh;
    display:flex; flex-direction:column; overflow:hidden;
  }
  .topbar{ flex:0 0 auto; padding-bottom:6px; margin-bottom:2px; flex-wrap:wrap; gap:6px; }
  .topbar-right{ gap:12px; overflow-x:auto; max-width:100%; padding-bottom:2px; }
  .topbar-right::-webkit-scrollbar{ height:4px; }
  .new-project-link, .save-indicator, .project-select{ flex-shrink:0; }

  /* stepView diventa un contenitore flex verticale: step-head e nav-row restano
     sempre visibili (fissi), solo la parte centrale (control-bar + orbit-wrap)
     scorre — evita che il titolo venga tagliato in alto o i pulsanti Avanti/Indietro
     restino irraggiungibili in basso quando il contenuto dello step è alto (es. Icone). */
  #stepView{ flex:1 1 auto; min-height:0; display:flex; flex-direction:column; }
  .step-head{ flex:0 0 auto; padding:4px 0 0; }
  .step-title{ font-size:19px; margin:0 0 2px; }
  .step-sub{ font-size:11.5px; max-width:320px; line-height:1.3; }
  .bounds-warning{ flex:0 0 auto; }
  .step-scroll{
    display:flex; flex-direction:column; flex:1 1 auto; min-height:0;
    overflow-y:auto; -webkit-overflow-scrolling:touch;
  }
  .control-bar{ flex:0 0 auto; margin:6px 0 4px; }

  /* Griglia icone: larghezza limitata così le celle hanno una dimensione prevedibile,
     e max-height allineata a un multiplo esatto di (cella+gap) — prima la seconda riga
     veniva tagliata a metà e mostrava caselle vuote senza il glifo dentro. */
  .cat-tabs{ margin:0 auto 6px; }
  .icon-grid{ grid-template-columns:repeat(8,1fr); max-width:480px; max-height:56px; }

  /* Card forma più grandi su mobile invece che rimpicciolite: in orizzontale c'è
     molta larghezza libera, prima veniva sprecata. */
  .shape-row{ gap:16px; }
  .shape-card-row{ width:120px; padding:11px 14px 8px; }
  .shape-card-row svg{ width:38px; height:38px; }

  .orbit-wrap{
    height:auto; max-width:none; margin-top:2px; flex:0 0 auto;
    display:flex; flex-direction:row; align-items:flex-start; gap:14px;
  }
  .orbit-wrap::before, .orbit-wrap::after{ display:none; }
  .tag-center{
    position:static; transform:none; width:auto; flex:0 0 auto; gap:5px;
  }
  .tag-wrap{ width:min(34vh,40vw,240px); height:min(34vh,40vw,240px); }
  .stage-readout{ display:none; }
  #orbitItemsList{
    position:static; flex:1 1 auto; display:flex; flex-direction:column; gap:8px;
    max-height:min(62vh,420px); overflow-y:auto; padding-right:4px;
  }
  .orbit-item{ position:static !important; width:100% !important; }

  .sat-size button{ width:32px; height:32px; font-size:15px; }
  .nav-row{ flex:0 0 auto; margin-top:6px; flex-wrap:wrap; }

  /* completion-view è un fratello di stepView, quindi non era coperto dal
     flex-column + overflow:hidden di .app impostato sopra: senza queste regole
     restava tagliata e irraggiungibile oltre la prima schermata su mobile. */
  .completion-view{
    flex:1 1 auto; min-height:0; overflow-y:auto; -webkit-overflow-scrolling:touch;

function redoNext(){
  if(redoStack.length === 0) return;

function pointInPolygon(px, py, poly){
  let inside = false;
  for(let i=0, j=poly.length-1; i<poly.length; j=i++){
    const xi=poly[i][0], yi=poly[i][1], xj=poly[j][0], yj=poly[j][1];
    const intersect = ((yi>py) !== (yj>py)) && (px < (xj-xi)*(py-yi)/(yj-yi)+xi);
    if(intersect) inside = !inside;
  }
  return inside;
}

function pointInShape(px, py, shape){
  if(shape==='round'){
    const dx=px-170, dy=py-170;
    return (dx*dx+dy*dy) <= (140*140);
  }
  if(shape==='oval'){
    const dx=(px-170)/152, dy=(py-170)/102;
    return (dx*dx+dy*dy) <= 1;
  }
  if(shape==='rect'){
    if(px<38||px>302||py<68||py>272) return false;
    const rx=26;
    const cornerCheck = (cx,cy)=>{ const dx=px-cx, dy=py-cy; return (dx*dx+dy*dy) <= rx*rx; };
    if(px<38+rx && py<68+rx) return cornerCheck(38+rx,68+rx);
    if(px>302-rx && py<68+rx) return cornerCheck(302-rx,68+rx);
    if(px<38+rx && py>272-rx) return cornerCheck(38+rx,272-rx);
    if(px>302-rx && py>272-rx) return cornerCheck(302-rx,272-rx);
    return true;
  }
  if(shape==='bone'){
    return pointInPolygon(px, py, BONE_POLYGON);
  }
  return true;
}

function elementCorners(el){
  let hw, hh;
  if(el.type==='icon'){
    hw = el.size/2+6; hh = el.size/2+6;
  } else {
    const font = fontById(el.fontId);
    const blk = estimateTextBlockSize(el.content, el.size, font.id);
    hw = blk.width/2+8; hh = blk.height/2+8;
  }
  const rot = (el.rotation||0) * Math.PI/180;
  const cos = Math.cos(rot), sin = Math.sin(rot);
  const corners = [[-hw,-hh],[hw,-hh],[hw,hh],[-hw,hh]];
  return corners.map(([cx,cy])=>[
    el.x + cx*cos - cy*sin,
    el.y + cx*sin + cy*cos
  ]);
}

function checkElementBounds(el){
  const corners = elementCorners(el);
  const allInside = corners.every(([px,py]) => pointInShape(px,py,state.shape));
  let hitsHole = false;
  if(state.hole){
    const hh = SHAPE_HOLE[state.shape];
    const dist = Math.hypot(el.x-hh.x, el.y-hh.holeY);
    const elRadius = Math.max(...corners.map(([px,py])=>Math.hypot(px-el.x,py-el.y)));
    hitsHole = dist < (14 + elRadius*0.4);
  }
  return { outOfBounds: !allInside, hitsHole };
}

function computeAllWarnings(){
  const warnings = [];
  state.elements.filter(e=>e.placed).forEach(el=>{
    const res = checkElementBounds(el);
    if(res.outOfBounds || res.hitsHole){
      warnings.push({ id: el.id, outOfBounds: res.outOfBounds, hitsHole: res.hitsHole });
    }
  });
  return warnings;
}

const fontFileCache = {};
const fontFilePending = {};
async function loadRealFont(fontId){
  if(fontFileCache[fontId]) return fontFileCache[fontId];
  if(fontFilePending[fontId]) return fontFilePending[fontId];
  const url = FONT_FILE_URLS[fontId];
  fontFilePending[fontId] = fetch(url).then(r=>r.arrayBuffer()).then(buf=>{
    const font = opentype.parse(buf);
    fontFileCache[fontId] = font;
    delete fontFilePending[fontId];
    return font;
  }).catch(err=>{
    delete fontFilePending[fontId];
    throw err;
  });
  return fontFilePending[fontId];
}
// Larghezza reale di una stringa nel font vero (solo avanzamento, no path) — usata per
// misurare i bounding box in editing, non solo in export. Stessa logica di kerning di
// getTextPathSafe qui sotto, ma senza costruire i contorni: serve solo un numero.
function getRealTextWidth(font, text, fontSize){
  const scale = 1 / font.unitsPerEm * fontSize;
  const glyphs = Array.from(text).map(ch => font.charToGlyph(ch));
  let width = 0;
  for(let i=0;i<glyphs.length;i++){
    width += glyphs[i].advanceWidth * scale;
    if(i < glyphs.length-1){
      try{ width += font.getKerningValue(glyphs[i], glyphs[i+1]) * scale; } catch(e){}
    }
  }
  return width;
}
// Un font TTF viene scaricato al massimo una volta, poi resta in cache per tutta la
// sessione. Finché non è pronto, estimateTextWidth usa il fallback euristico qui sotto;
// non appena il font arriva, ridisegna la tag con le misure vere.
const fontLoadNotified = new Set();
function ensureFontLoaded(fontId){
  if(fontFileCache[fontId] || fontLoadNotified.has(fontId)) return;
  fontLoadNotified.add(fontId);
  loadRealFont(fontId).then(()=>{ renderTag(); }).catch(()=>{ fontLoadNotified.delete(fontId); });
}
// Alcuni font (Inter, Great Vibes, Oswald, Bangers, e potenzialmente altri) contengono
// tabelle GSUB con sostituzioni contestuali che opentype.js non supporta (lookupType 6,
// substFormat 2): font.getPath() va in eccezione non appena il testo supera un carattere.
// Bypassiamo la sostituzione andando lettera per lettera via charToGlyph (mappatura cmap
// diretta, senza legature/contestuali) e componendo il path a mano col kerning nativo.
function getTextPathSafe(font, text, x, y, fontSize){
  const fullPath = new opentype.Path();
  const scale = 1 / font.unitsPerEm * fontSize;
  const glyphs = Array.from(text).map(ch => font.charToGlyph(ch));
  let currentX = x;
  for(let i=0;i<glyphs.length;i++){
    const glyph = glyphs[i];
    fullPath.extend(glyph.getPath(currentX, y, fontSize));
    let advance = glyph.advanceWidth * scale;
    if(i < glyphs.length-1){
      try{ advance += font.getKerningValue(glyph, glyphs[i+1]) * scale; } catch(e){}
    }
    currentX += advance;
  }
  return fullPath;
}

  if(hole) parts.push(`${hole} element${hole>1?'i':'o'} tocca${hole>1?'no':''} il foro`);

function estimateTextWidth(str, size, fontId){
  const realFont = fontFileCache[fontId];
  if(realFont){
    try{ return Math.max(20, getRealTextWidth(realFont, str, size)); }
    catch(e){ /* glifo non mappabile o simile: cade sul fallback sotto */ }
  } else {
    ensureFontLoaded(fontId);
  }
  const factor = (fontId==='script'||fontId==='hand'||fontId==='marker') ? 0.42 : (fontId==='mono'||fontId==='monument') ? 0.62 : 0.56;
  return Math.max(20, str.length * size * factor);
}
function textLines(content){
  return String(content).split('\n');
}
function estimateTextBlockSize(content, size, fontId){
  const lines = textLines(content);
  const widths = lines.map(l => estimateTextWidth(l.length?l:' ', size, fontId));
  return { width: Math.max(...widths), height: size*1.18*lines.length };
}
function textTspans(content, size){
  const lines = textLines(content);
  const lineHeight = size*1.18;
  const totalH = lineHeight*lines.length;
  const startY = -totalH/2 + lineHeight/2;
  return lines.map((line,i)=>`<tspan x="0" y="${(startY+i*lineHeight).toFixed(2)}">${escapeXML(line.length?line:' ')}</tspan>`).join('');
}
function escapeXML(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function findIcon(iconId){
  for(const cat in ICONS){ const found = ICONS[cat].find(i=>i.id===iconId); if(found) return found; }
  return {glyph:'?'};
}

function applyElementGeometry(g, el){
  if(el.type==='icon'){
    const icon = findIcon(el.iconId);
    const sz = el.size;
    const isFull = el.fill==='pieno';
    if(icon.glyph){
      const text = g.querySelector('text');
      if(text) text.setAttribute('font-size', sz);
    } else {
      const innerG = g.querySelector('g');
      if(innerG){
        innerG.setAttribute('transform', `translate(${-sz/2},${-sz/2}) scale(${sz/24})`);
        if(isFull){ innerG.setAttribute('fill','#221f1a'); innerG.setAttribute('stroke','none'); }
        else { innerG.setAttribute('fill','none'); innerG.setAttribute('stroke','#221f1a'); innerG.setAttribute('stroke-width','1.6'); }
      }
    }
    updateBoxAndHandles(g, sz/2+6, sz/2+6);
  } else {
    const font = fontById(el.fontId);
    const blk = estimateTextBlockSize(el.content, el.size, font.id);
    const text = g.querySelector('text');
    if(text){ text.setAttribute('font-size', el.size); text.innerHTML = textTspans(el.content, el.size); }
    updateBoxAndHandles(g, blk.width/2+8, blk.height/2+8);
  }
}
function updateBoxAndHandles(g, hw, hh){
  const box = g.querySelector('.sel-box');
  if(box){ box.setAttribute('x',-hw); box.setAttribute('y',-hh); box.setAttribute('width',hw*2); box.setAttribute('height',hh*2); }
  const line = g.querySelector('.rotate-line');
  if(line){ line.setAttribute('y1',-hh); line.setAttribute('y2', -hh-16); }
  const rh = g.querySelector('.rotate-handle');
  if(rh){ rh.setAttribute('cy', -hh-16); }
  const sh = g.querySelector('.resize-handle');
  if(sh){ sh.setAttribute('x', hw-6); sh.setAttribute('y', hh-6); }

function safeCapture(el, pointerId){
  // setPointerCapture può lanciare eccezione in edge case di multi-touch (soprattutto
  // durante il pinch, quando due pointerId vengono catturati quasi in contemporanea).
  // Se non la intercettiamo, l'eccezione interrompe il resto della callback che la
  // contiene — incluso l'aggiornamento di stato che di solito viene subito dopo.
  try{ el.setPointerCapture(pointerId); }catch(err){ /* pointer non più attivo: ignora */ }
}
function safeRelease(el, pointerId){
  try{ el.releasePointerCapture(pointerId); }catch(err){ /* pointer già rilasciato: ignora */ }
}
let onTagDrag = null;
function attachDragHandlers(){
  const svg = document.getElementById('tagSvg');
  if(!svg) return;
  svg.querySelectorAll('.drag-el').forEach(g=>{
    g.addEventListener('pointerdown', e=>{
      if(e.target.closest('.handle')) return;
      e.preventDefault();
      state.selectedId = g.dataset.id;
      svg.querySelectorAll('.drag-el').forEach(x=>x.classList.remove('selected'));
      g.classList.add('selected');
      const pt = svgPoint(svg, e);
      const el = state.elements.find(x=>x.id===g.dataset.id);
      onTagDrag = { id: el.id, offX: pt.x-el.x, offY: pt.y-el.y };
      safeCapture(g, e.pointerId);
    });
  });
  svg.querySelectorAll('.resize-handle').forEach(h=>{
    h.addEventListener('pointerdown', e=>{
      e.preventDefault(); e.stopPropagation();
      const g = h.closest('.drag-el');
      const el = state.elements.find(x=>x.id===g.dataset.id);
      const startSize = el.size;
      const startPt = svgPoint(svg, e);
      const startDist = Math.max(1, Math.hypot(startPt.x-el.x, startPt.y-el.y));
      safeCapture(h, e.pointerId);
      function onMove(ev){
        const pt = svgPoint(svg, ev);
        const dist = Math.hypot(pt.x-el.x, pt.y-el.y);
        const scale = dist/startDist;
        const min = el.type==='icon' ? 18 : 16;
        el.size = Math.max(min, Math.min(90, Math.round(startSize*scale)));
        applyElementGeometry(g, el);
      }
      function onUp(){
        safeRelease(h, e.pointerId);
        h.removeEventListener('pointermove', onMove);
        h.removeEventListener('pointerup', onUp);
        pushHistory(); saveProject();
      }
      h.addEventListener('pointermove', onMove);
      h.addEventListener('pointerup', onUp);
    });
  });
  svg.querySelectorAll('.rotate-handle').forEach(h=>{
    h.addEventListener('pointerdown', e=>{
      e.preventDefault(); e.stopPropagation();
      const g = h.closest('.drag-el');
      const el = state.elements.find(x=>x.id===g.dataset.id);
      safeCapture(h, e.pointerId);
      function onMove(ev){
        const pt = svgPoint(svg, ev);
        const angle = Math.atan2(pt.y-el.y, pt.x-el.x) * 180/Math.PI + 90;
        el.rotation = Math.round(angle);
        g.setAttribute('transform', `translate(${el.x},${el.y}) rotate(${el.rotation})`);
      }
      function onUp(){
        safeRelease(h, e.pointerId);
        h.removeEventListener('pointermove', onMove);
        h.removeEventListener('pointerup', onUp);
        pushHistory(); saveProject();
      }
      h.addEventListener('pointermove', onMove);
      h.addEventListener('pointerup', onUp);
    });
  });
  svg.addEventListener('pointermove', e=>{
    if(!onTagDrag) return;
    const pt = svgPoint(svg, e);
    const el = state.elements.find(x=>x.id===onTagDrag.id);
    if(!el) return;
    el.x = snapVal(Math.round(pt.x - onTagDrag.offX));
    el.y = snapVal(Math.round(pt.y - onTagDrag.offY));
    const g = svg.querySelector(`[data-id="${el.id}"]`);
    if(g) g.setAttribute('transform', `translate(${el.x},${el.y}) rotate(${el.rotation||0})`);
  });
  ['pointerup','pointerleave'].forEach(evt=>{
    svg.addEventListener(evt, ()=>{ if(onTagDrag){ pushHistory(); saveProject(); } onTagDrag = null; });
  });

  let panState = null;
  // Tracciamento multi-touch per il pinch-to-zoom: lo zoom prima era agganciato solo
  // all'evento 'wheel' (rotellina mouse), quindi su schermo touch era irraggiungibile.
  const activePointers = new Map(); // pointerId -> {x,y}
  let pinchState = null; // {startDist, startZoom}
  function pinchDistance(){
    const pts = Array.from(activePointers.values());
    if(pts.length<2) return 0;
    return Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y);
  }
  svg.addEventListener('pointerdown', e=>{
    if(e.target.closest('.drag-el') || e.target.closest('.handle')) return;
    e.preventDefault();
    activePointers.set(e.pointerId, { x:e.clientX, y:e.clientY });
    safeCapture(svg, e.pointerId);
    if(activePointers.size>=2){
      panState = null;
      svg.classList.remove('panning');
      pinchState = { startDist: pinchDistance(), startZoom: state.zoom };
    } else {
      panState = { startX:e.clientX, startY:e.clientY, panX:state.panX, panY:state.panY };
      svg.classList.add('panning');
    }
  });
  svg.addEventListener('pointermove', e=>{
    if(activePointers.has(e.pointerId)) activePointers.set(e.pointerId, { x:e.clientX, y:e.clientY });
    if(pinchState && activePointers.size>=2){
      const dist = pinchDistance();
      if(pinchState.startDist>0){
        const scale = dist/pinchState.startDist;
        state.zoom = Math.max(0.5, Math.min(3, pinchState.startZoom*scale));
        document.getElementById('tagWrap').style.transform = `translate(${state.panX}px,${state.panY}px) scale(${state.zoom})`;
      }
      return;
    }
    if(!panState) return;
    state.panX = panState.panX + (e.clientX - panState.startX);
    state.panY = panState.panY + (e.clientY - panState.startY);
    document.getElementById('tagWrap').style.transform = `translate(${state.panX}px,${state.panY}px) scale(${state.zoom})`;
  });
  ['pointerup','pointerleave','pointercancel'].forEach(evt=>{
    svg.addEventListener(evt, e=>{
      activePointers.delete(e.pointerId);
      panState = null;
      svg.classList.remove('panning');
      if(activePointers.size>=2){
        pinchState = { startDist: pinchDistance(), startZoom: state.zoom };
      } else if(activePointers.size===1){
        pinchState = null;
        const [[,pos]] = Array.from(activePointers.entries());
        panState = { startX:pos.x, startY:pos.y, panX:state.panX, panY:state.panY };
        svg.classList.add('panning');
      } else {
        pinchState = null;
      }
    });
  });
  svg.addEventListener('wheel', e=>{
    e.preventDefault();
    const delta = e.deltaY > 0 ? -0.1 : 0.1;
    state.zoom = Math.max(0.5, Math.min(3, state.zoom + delta));
    document.getElementById('tagWrap').style.transform = `translate(${state.panX}px,${state.panY}px) scale(${state.zoom})`;
  }, { passive:false });
}
function svgPoint(svg, evt){
  const rect = svg.getBoundingClientRect();
  const scaleX = 340/rect.width, scaleY = 340/rect.height;
  return { x:(evt.clientX-rect.left)*scaleX, y:(evt.clientY-rect.top)*scaleY };
}
function selectElement(id){
  state.selectedId = id;
  renderTag();
}

function attachSatelliteDrag(previewEl, elId){
  previewEl.addEventListener('pointerdown', e=>{
    e.preventDefault();
    const visual = previewEl.querySelector('.sat-preview-visual');
    const rect = visual.getBoundingClientRect();
    const clone = document.createElement('div');
    clone.className = 'floating-clone';
    clone.innerHTML = visual.innerHTML;
    const size = Math.max(rect.width, rect.height, 40) + 20;
    clone.style.width = size+'px';
    clone.style.height = size+'px';
    const centerX = rect.left + rect.width/2, centerY = rect.top + rect.height/2;
    clone.style.left = (centerX - size/2)+'px';
    clone.style.top = (centerY - size/2)+'px';
    document.body.appendChild(clone);
    const offX = e.clientX-(centerX-size/2), offY = e.clientY-(centerY-size/2);
    safeCapture(previewEl, e.pointerId);
    function onMove(ev){
      clone.style.left = (ev.clientX-offX)+'px';
      clone.style.top = (ev.clientY-offY)+'px';
    }
    function onUp(ev){
      safeRelease(previewEl, e.pointerId);
      previewEl.removeEventListener('pointermove', onMove);
      previewEl.removeEventListener('pointerup', onUp);
      clone.remove();
      const svg = document.getElementById('tagSvg');
      const svgRect = svg.getBoundingClientRect();
      const el = state.elements.find(x=>x.id===elId);
      let justPlaced = false;
      if(ev.clientX>=svgRect.left && ev.clientX<=svgRect.right && ev.clientY>=svgRect.top && ev.clientY<=svgRect.bottom){
        const scaleX = 340/svgRect.width, scaleY = 340/svgRect.height;
        el.x = snapVal(Math.round((ev.clientX-svgRect.left)*scaleX));
        el.y = snapVal(Math.round((ev.clientY-svgRect.top)*scaleY));
        justPlaced = !el.placed;
        el.placed = true;
      }
      state.selectedId = elId;
      renderTag();
      renderOrbit();
      if(justPlaced){
        const g = document.querySelector(`#tagSvg [data-id="${elId}"]`);
        if(g){ g.classList.add('just-placed'); setTimeout(()=>g.classList.remove('just-placed'), 650); }
      }
    }
    previewEl.addEventListener('pointermove', onMove);
    previewEl.addEventListener('pointerup', onUp);
  });
}

    btn.addEventListener('click', submit);
    input.addEventListener('keydown', e=>{ if(e.key==='Enter' && (e.ctrlKey||e.metaKey)){ e.preventDefault(); submit(); } });
    input.addEventListener('input', ()=>{ input.style.height='auto'; input.style.height=input.scrollHeight+'px'; });

    });
    bar.querySelectorAll('.icon-card').forEach(card=>{
      card.addEventListener('click', ()=>{
        const id = 'el'+(state.nextId++);
        state.elements.push({ id, type:'icon', iconId:card.dataset.icon, x:170, y:170, size:44, fill:'linea', rotation:0, placed:false });
        state.selectedId = id;

let orbitResizeObserver = null;
function isMobileLayout(){
  return window.matchMedia('(pointer:coarse) and (max-width:980px)').matches;
}
function renderOrbit(){
  const list = document.getElementById('orbitItemsList');
  list.querySelectorAll('.orbit-item').forEach(n=>n.remove());
  const step = STEPS[state.step];
  if(step==='forma'){
    // le forme sono in riga nella control bar, nessun satellite qui
  } else {
    const relevant = state.elements.filter(e=> step==='testo' ? e.type==='text' : true);
    const nodes = relevant.map(el=>{
      const item = document.createElement('div');
      item.className = 'orbit-item';
      item.style.width = '150px';
      item.style.visibility = 'hidden';
      item.innerHTML = satelliteHTML(el);
      list.appendChild(item);
      bindSatelliteEvents(item, el);
      return item;
    });
    layoutOrbitItems(nodes);
    nodes.forEach(n=>{ n.style.visibility = ''; });
    if(orbitResizeObserver) orbitResizeObserver.disconnect();
    if(!isMobileLayout()){
      orbitResizeObserver = new ResizeObserver(()=>{ layoutOrbitItems(Array.from(list.querySelectorAll('.orbit-item'))); });
      nodes.forEach(n=> orbitResizeObserver.observe(n));
    }
  }
  renderTag();
  pushHistory();
  saveProject();
}
// Posiziona i box satellite attorno alla tag usando l'altezza REALE di ciascuno
// (misurata dal browser), invece di uno spazio fisso: evita che box di testo
// (più alti, con textarea+select) si sovrappongano a quelli delle icone (più bassi),
// e si riadatta anche se l'utente ridimensiona manualmente la textarea del testo.
// Su mobile (telefono in orizzontale) non serve: i box diventano una lista verticale
// scrollabile gestita interamente dal CSS (flex-direction:column), niente calcoli.
function layoutOrbitItems(nodes){
  if(nodes.length===0) return;
  if(isMobileLayout()) return;
  const orbit = document.getElementById('orbitItemsList');
  if(!orbit) return;
  const W = orbit.clientWidth || 900;
  const maxY = (orbit.clientHeight || 960) - 30;
  const itemW = 150, gap = 14, colStep = 164, topStart = 60, sideGutter = 6;
  const first = nodes[0];
  first.style.left = (W/2 - itemW/2)+'px';
  first.style.top = '4px';
  const rest = nodes.slice(1);
  const rightItems = rest.filter((_,i)=> i%2===0);
  const leftItems = rest.filter((_,i)=> i%2===1);
  function placeSide(items, isRight){
    let col = 0, y = topStart;
    items.forEach(node=>{
      const h = node.offsetHeight || 200;
      if(y + h > maxY && y > topStart){ col++; y = topStart; }
      const x = isRight ? (W - itemW - sideGutter + col*colStep) : (sideGutter - col*colStep);
      node.style.left = x+'px';
      node.style.top = y+'px';
      y += h + gap;
    });
  }
  placeSide(rightItems, true);
  placeSide(leftItems, false);
}

function satelliteHTML(el){
  const unplacedCls = el.placed ? '' : ' unplaced';
  if(el.type==='icon'){
    const icon = findIcon(el.iconId);
    const isFull = el.fill==='pieno';
    const svg = icon.glyph ? `<span class="glyph">${icon.glyph}</span>` : `<svg viewBox="0 0 24 24" ${isFull?'fill="currentColor" stroke="none"':'fill="none" stroke="currentColor" stroke-width="1.6"'} stroke-linecap="round" stroke-linejoin="round">${icon.d?`<path d="${icon.d}"/>`:''}${icon.extra||''}</svg>`;
    return `<div class="satellite${unplacedCls}" data-id="${el.id}">
      <div class="sat-preview-drag" data-role="drag">
        <div class="sat-preview-visual sat-preview-icon">${svg}</div>
        <div class="sat-drag-label">${el.placed?'trascina per spostare':'trascina sulla tag'}</div>
      </div>
      <div class="sat-controls">
        <div class="sat-fill-toggle">
          <button data-fill="linea" class="${!isFull?'active':''}">Linea</button>
          <button data-fill="pieno" class="${isFull?'active':''}">Pieno</button>
        </div>
        <div class="sat-row">
          <div class="sat-size"><button data-act="dec">−</button><span>${el.size}</span><button data-act="inc">+</button></div>
        </div>
        <div class="sat-align">
          <button data-align="h" ${el.placed?'':'disabled'} title="Centra orizzontalmente sulla tag">↔ Centra H</button>
          <button data-align="v" ${el.placed?'':'disabled'} title="Centra verticalmente sulla tag">↕ Centra V</button>
        </div>
        <div class="sat-actions">
          <span class="sat-dup">duplica</span>
          <span class="sat-del">elimina</span>
        </div>
      </div>
    </div>`;
  }
  const font = fontById(el.fontId);
  const isFull = el.fill!=='contorno';
  const opts = FONTS.map(f=>`<option value="${f.id}" ${f.id===el.fontId?'selected':''}>${f.label}</option>`).join('');
  return `<div class="satellite${unplacedCls}" data-id="${el.id}">
    <div class="sat-preview-drag" data-role="drag">
      <div class="sat-preview-visual"><span class="sat-preview-text" style="font-family:${font.family}; font-weight:${font.weight}; ${isFull?'':'color:transparent; -webkit-text-stroke:1px var(--text-1);'}">${escapeHTML(el.content)}</span></div>
      <div class="sat-drag-label">${el.placed?'trascina per spostare':'trascina sulla tag'}</div>
    </div>
    <div class="sat-controls">
      <textarea class="sat-text-input">${escapeHTML(el.content)}</textarea>
      <select class="sat-select">${opts}</select>
      <div class="sat-fill-toggle">
        <button data-fill="contorno" class="${!isFull?'active':''}">Contorno</button>
        <button data-fill="pieno" class="${isFull?'active':''}">Pieno</button>
      </div>
      <div class="sat-row">
        <div class="sat-size"><button data-act="dec">−</button><span>${el.size}</span><button data-act="inc">+</button></div>
      </div>
      <div class="sat-align">
        <button data-align="h" ${el.placed?'':'disabled'} title="Centra orizzontalmente sulla tag">↔ Centra H</button>
        <button data-align="v" ${el.placed?'':'disabled'} title="Centra verticalmente sulla tag">↕ Centra V</button>
      </div>
      <div class="sat-actions">
        <span class="sat-dup">duplica</span>
        <span class="sat-del">elimina</span>
      </div>
    </div>
  </div>`;
}

function bindSatelliteEvents(item, el){
  const drag = item.querySelector('.sat-preview-drag');
  attachSatelliteDrag(drag, el.id);
  const sel = item.querySelector('.sat-select');
  if(sel) sel.addEventListener('change', ()=>{ el.fontId = sel.value; renderOrbit(); });
  const txt = item.querySelector('.sat-text-input');
  if(txt) txt.addEventListener('input', ()=>{ el.content = txt.value || ' '; renderTag(); refreshPreviewOnly(item, el); });
  item.querySelectorAll('.sat-fill-toggle button').forEach(btn=>{
    btn.addEventListener('click', ()=>{ el.fill = btn.dataset.fill; renderOrbit(); });
  });
  item.querySelectorAll('.sat-size button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const delta = btn.dataset.act==='inc' ? 1 : -1;
      const min = el.type==='icon' ? 18 : 16;
      el.size = Math.max(min, Math.min(90, el.size+delta));
      renderOrbit();
    });
  });
  item.querySelectorAll('.sat-align button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      if(!el.placed) return;
      if(btn.dataset.align==='h') el.x = snapVal(TAG_CENTER);
      else el.y = snapVal(TAG_CENTER);
      renderOrbit();
    });
  });
  item.querySelector('.sat-dup').addEventListener('click', ()=>{
    const copy = JSON.parse(JSON.stringify(el));
    copy.id = 'el'+(state.nextId++);
    if(copy.placed){ copy.x = snapVal(copy.x+16); copy.y = snapVal(copy.y+16); }
    state.elements.push(copy);
    state.selectedId = copy.id;
    renderOrbit();
  });
  item.querySelector('.sat-del').addEventListener('click', ()=>{
    state.elements = state.elements.filter(x=>x.id!==el.id);
    if(state.selectedId===el.id) state.selectedId=null;
    renderOrbit();
  });
}
function refreshPreviewOnly(item, el){
  const p = item.querySelector('.sat-preview-text');
  if(p) p.textContent = el.content;
}

function escapeHTML(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderAll(){
  const stepView = document.getElementById('stepView');
  const completionView = document.getElementById('completionView');
  if(state.completed){
    stepView.style.display = 'none';
    completionView.classList.add('visible');
    renderCompletionView();
    return;
  }
  stepView.style.display = '';
  completionView.classList.remove('visible');
  renderSteps();
  renderHead();
  renderControlBar();
  renderHoleToggle();
  renderOrbit();
  renderNav();
}

      </filter>
      <clipPath id="tagClipC">${shapeClipContent()}</clipPath>
    </defs>
    ${shapeOutlineSVG().replace('url(#metalFill)','url(#metalFillC)')}
    <g clip-path="url(#tagClipC)">
      <rect x="0" y="0" width="340" height="340" fill="url(#brushedC)"/>
      <rect x="0" y="0" width="340" height="340" filter="url(#brushLight)" style="mix-blend-mode:screen; pointer-events:none;"/>
      <g filter="url(#engraveDepth)">${elsHTML}</g>
    </g>
    ${state.hole ? `
      <circle cx="${SHAPE_HOLE[state.shape].x}" cy="${SHAPE_HOLE[state.shape].ringY}" r="14" fill="none" stroke="#59564d" stroke-width="4"/>
      <circle cx="${SHAPE_HOLE[state.shape].x}" cy="${SHAPE_HOLE[state.shape].holeY}" r="8.4" fill="#161512" stroke="#3a3833" stroke-width="1.5"/>
    ` : ''}
  </svg>`;
}

const STORAGE_KEY = 'dial-tag-autosave';
const PROJECTS_KEY = 'dial-tag-projects';
const ACTIVE_PROJECT_KEY = 'dial-tag-active-project';
let saveTimer = null;

function getProjects(){
  try{ return JSON.parse(localStorage.getItem(PROJECTS_KEY)) || {}; }
  catch(err){ return {}; }
}
function getActiveProjectName(){
  return localStorage.getItem(ACTIVE_PROJECT_KEY) || null;
}
function currentPayload(){
  return { shape: state.shape, hole: state.hole, elements: state.elements, nextId: state.nextId, savedAt: Date.now() };
}

function saveProject(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    try{
      const payload = currentPayload();
      const active = getActiveProjectName();
      if(active){
        const projects = getProjects();
        projects[active] = payload;
        localStorage.setItem(PROJECTS_KEY, JSON.stringify(projects));
      } else {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
      }
      flashSaveIndicator();
    } catch(err){
      console.warn('Salvataggio automatico non riuscito', err);
    }
  }, 300);
}

function saveProjectAs(){
  const suggested = getActiveProjectName() || '';
  const name = prompt('Nome del progetto:', suggested);
  if(!name || !name.trim()) return;
  const trimmed = name.trim();
  const projects = getProjects();
  projects[trimmed] = currentPayload();
  localStorage.setItem(PROJECTS_KEY, JSON.stringify(projects));
  localStorage.setItem(ACTIVE_PROJECT_KEY, trimmed);
  refreshProjectSelect();
  flashSaveIndicator();
}
function saveProjectNow(){
  if(!getActiveProjectName()){ saveProjectAs(); return; }
  saveProject();
}
function deleteProject(){
  const active = getActiveProjectName();
  if(!active){
    alert('Nessun progetto salvato è selezionato al momento (stai lavorando sul salvataggio automatico, che non si può eliminare da qui). Seleziona un progetto dal menu in alto per eliminarlo.');
    return;
  }
  if(!confirm(`Eliminare definitivamente il progetto "${active}"? L'operazione non è reversibile.`)) return;
  const projects = getProjects();
  delete projects[active];
  localStorage.setItem(PROJECTS_KEY, JSON.stringify(projects));
  localStorage.removeItem(ACTIVE_PROJECT_KEY);
  state.step = 0; state.shape = 'round'; state.hole = true; state.elements = [];
  state.selectedId = null; state.nextId = 1; state.zoom = 1; state.panX = 0; state.panY = 0;
  historyStack.length = 0; redoStack.length = 0;
  refreshProjectSelect();
  renderAll();
  flashSaveIndicator();
}
function loadNamedProject(name){
  const projects = getProjects();
  const payload = projects[name];
  if(!payload) return false;
  state.shape = payload.shape || 'round';
  state.hole = payload.hole !== undefined ? payload.hole : true;
  state.elements = Array.isArray(payload.elements) ? payload.elements : [];
  state.nextId = payload.nextId || (state.elements.length+1);
  state.selectedId = null;
  localStorage.setItem(ACTIVE_PROJECT_KEY, name);
  refreshProjectSelect();
  renderAll();
  return true;
}
function exportProjectFile(){
  const payload = { dialProject: true, version: 1, ...currentPayload() };
  const name = getActiveProjectName() || 'progetto-dial';
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = name.replace(/[^a-z0-9-_]+/gi,'_') + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function importProjectFile(file){
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const payload = JSON.parse(reader.result);
      if(!payload || !Array.isArray(payload.elements)){
        alert('Questo file non sembra un progetto Dial valido.');
        return;
      }
      state.shape = payload.shape || 'round';
      state.hole = payload.hole !== undefined ? payload.hole : true;
      state.elements = payload.elements;
      state.nextId = payload.nextId || (state.elements.length+1);
      state.selectedId = null;
      historyStack.length = 0; redoStack.length = 0;
      renderAll();
    } catch(err){
      alert('Non sono riuscito a leggere questo file. Assicurati sia un progetto esportato da qui.');
    }
  };
  reader.readAsText(file);
}

function refreshProjectSelect(){
  const sel = document.getElementById('projectSelect');
  if(!sel) return;
  const projects = getProjects();
  const names = Object.keys(projects).sort();
  const active = getActiveProjectName();
  const opts = ['<option value="">— autosalvataggio —</option>']
    .concat(names.map(n=>`<option value="${escapeHTML(n)}" ${n===active?'selected':''}>${escapeHTML(n)}</option>`));
  sel.innerHTML = opts.join('');
  if(!active) sel.value = '';
}
function flashSaveIndicator(){
  const el = document.getElementById('saveIndicator');
  if(!el) return;
  el.classList.add('visible');
  clearTimeout(el._t);
  el._t = setTimeout(()=>el.classList.remove('visible'), 1400);
}
function loadProject(){
  const active = getActiveProjectName();
  if(active){
    const projects = getProjects();
    if(projects[active]){
      const payload = projects[active];
      state.shape = payload.shape || 'round';
      state.hole = payload.hole !== undefined ? payload.hole : true;
      state.elements = Array.isArray(payload.elements) ? payload.elements : [];
      state.nextId = payload.nextId || (state.elements.length+1);
      return true;
    }
  }
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return false;
    const payload = JSON.parse(raw);
    state.shape = payload.shape || 'round';
    state.hole = payload.hole !== undefined ? payload.hole : true;
    state.elements = Array.isArray(payload.elements) ? payload.elements : [];
    state.nextId = payload.nextId || (state.elements.length+1);
    return true;
  } catch(err){
    console.warn('Ripristino del progetto salvato non riuscito', err);
    return false;
  }
}

const MM_SCALE = 25/280; // diametro reale tag rotonda: 25mm (era 40mm) — vedi nota ordine Amazon B0DZXB4WWS
const ENGRAVE_LINE_MM = 0.05;
const ENGRAVE_LINE_INTERNAL = ENGRAVE_LINE_MM / MM_SCALE;

function shapeCutMarkup(){
  const s = state.shape;
  if(s==='round') return '<circle cx="170" cy="170" r="140"/>';
  if(s==='oval') return '<ellipse cx="170" cy="170" rx="152" ry="102"/>';
  if(s==='rect') return '<rect x="38" y="68" width="264" height="204" rx="26"/>';
  if(s==='bone') return `<path d="${shapePathD('bone')}"/>`;
  return '';
}

async function buildExportSVGString(){
  const w = 340*MM_SCALE, h = 340*MM_SCALE;
  let taglio = shapeCutMarkup();
  if(state.hole){
    const hh = SHAPE_HOLE[state.shape];
    taglio += `<circle cx="${hh.x}" cy="${hh.holeY}" r="8.4"/>`;
  }
  let marcatura = '';
  for(const el of state.elements.filter(e=>e.placed)){
    const rot = el.rotation||0;
    if(el.type==='text'){
      const isFull = el.fill!=='contorno';
      const fillAttrs = isFull ? `fill="#00FF00" stroke="none"` : `fill="none" stroke="#00FF00" stroke-width="${ENGRAVE_LINE_INTERNAL.toFixed(3)}"`;
      let textMarkup;
      try{
        const realFont = await loadRealFont(el.fontId);
        const lines = textLines(el.content);
        const lineHeight = el.size*1.18;
        const totalH = lineHeight*lines.length;
        const perLine = lines.map((line, i) => {
          const txt = line.length?line:' ';
          let p;
          try{
            p = getTextPathSafe(realFont, txt, 0, 0, el.size);
          } catch(errSafe){
            p = realFont.getPath(txt, 0, 0, el.size); // ripiego se anche il metodo sicuro fallisce
          }
          const bbox = p.getBoundingBox();
          const cx = (bbox.x1+bbox.x2)/2;
          const lineY = -totalH/2 + lineHeight/2 + i*lineHeight;
          return `<path transform="translate(${-cx},${lineY.toFixed(2)})" d="${p.toPathData(2)}" ${fillAttrs}/>`;
        });
        textMarkup = perLine.join('');
      } catch(err){
        console.warn('Conversione font in tracciato non riuscita, uso testo con riferimento al font come ripiego', err);
        const font = fontById(el.fontId);
        textMarkup = `<text x="0" y="0" text-anchor="middle" font-size="${el.size}" font-family="${font.family}" font-weight="${font.weight}" ${fillAttrs}>${textTspans(el.content, el.size)}</text>`;
      }
      marcatura += `<g transform="translate(${el.x},${el.y}) rotate(${rot})">${textMarkup}</g>`;
    } else {
      const icon = findIcon(el.iconId);
      const sz = el.size;
      const iconIsFull = el.fill==='pieno';
      const iconFillAttrs = iconIsFull ? `fill="#00FF00" stroke="none"` : `fill="none" stroke="#00FF00" stroke-width="${ENGRAVE_LINE_INTERNAL.toFixed(3)}"`;
      const inner = icon.glyph
        ? `<text x="0" y="0" text-anchor="middle" dominant-baseline="central" font-size="${sz}" fill="#00FF00" font-family="'Inter',sans-serif" font-weight="600">${icon.glyph}</text>`
        : `<g transform="translate(${-sz/2},${-sz/2}) scale(${sz/24})" ${iconFillAttrs} stroke-linecap="round" stroke-linejoin="round">${icon.d?`<path d="${icon.d}"/>`:''}${icon.extra||''}</g>`;
      marcatura += `<g transform="translate(${el.x},${el.y}) rotate(${rot})">${inner}</g>`;
    }
  }
  return `<?xml version="1.0" encoding="UTF-8"?>
<svg width="${w.toFixed(2)}mm" height="${h.toFixed(2)}mm" viewBox="0 0 ${w.toFixed(2)} ${h.toFixed(2)}" xmlns="http://www.w3.org/2000/svg">
  <g transform="scale(${MM_SCALE})">
    <g id="TAGLIO" fill="none" stroke="#FF0000" stroke-width="1">${taglio}</g>
    <g id="MARCATURA-leggera">${marcatura}</g>
  </g>
</svg>`;
}
async function exportSVG(){
  const warnings = computeAllWarnings();
  if(warnings.length>0){
    const oob = warnings.filter(w=>w.outOfBounds).length;
    const hole = warnings.filter(w=>w.hitsHole).length;
    const parts = [];
    if(oob) parts.push(`${oob} elemento${oob>1?'i':''} fuori dalla tag`);
    if(hole) parts.push(`${hole} elemento${hole>1?'i':''} sul foro`);
    if(!confirm(`Attenzione: ${parts.join(' e ')}. Esportare comunque?`)) return;
  }
  const btn = document.getElementById('exportBtn');
  if(btn){ btn.textContent = 'Preparazione...'; btn.disabled = true; }
  try {
    const svg = await buildExportSVGString();
    const blob = new Blob([svg], {type:'image/svg+xml'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'dial-tag.svg';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch(err){
    console.error('Esportazione fallita', err);
    alert('Esportazione non riuscita. Controlla la connessione internet (serve per convertire i font in tracciati) e riprova.');
  } finally {
    if(btn){ btn.textContent = 'Esporta SVG'; btn.disabled = false; }
  }
}

// Dopo aver deployato lo script (vedi apps-script-backend.gs consegnato a parte),
// incolla qui l'URL "/exec" del deployment e la stessa SHARED_SECRET impostata là.
const ORDER_ENDPOINT_URL = 'https://script.google.com/macros/s/AKfycby8FmfZFAw9ykHikzSIlFO_x6lCZDp482swrDUWqShB6SzukwGdrXqgk10TEyy6dqWTbg/exec'; // es. https://script.google.com/macros/s/AKfycb.../exec
const ORDER_SHARED_SECRET = 'DialT@g717'; // deve combaciare esattamente con SHARED_SECRET nello script

function slugify(str){
  return String(str).toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'') // toglie gli accenti
    .replace(/[^a-z0-9]+/g,'-').replace(/(^-+|-+$)/g,'')
    .slice(0,40) || 'utente';
}

function setOrderStatus(msg, kind){
  const el = document.getElementById('orderStatus');
  if(!el) return;
  el.textContent = msg || '';
  el.className = 'order-status' + (kind ? ' ' + kind : '');
}
function resetOrderForm(clearValues){
  const nameEl = document.getElementById('orderName');
  const contactEl = document.getElementById('orderContact');
  const noteEl = document.getElementById('orderNote');
  const btn = document.getElementById('sendOrderBtn');
  if(!nameEl || !contactEl || !noteEl) return;
  nameEl.disabled = false; contactEl.disabled = false; noteEl.disabled = false;
  if(clearValues){ nameEl.value = ''; contactEl.value = ''; noteEl.value = ''; }
  if(btn){ btn.disabled = false; btn.textContent = 'Invia la tua tag'; }
  setOrderStatus('', '');
}

async function sendOrder(){
  const nameEl = document.getElementById('orderName');
  const contactEl = document.getElementById('orderContact');
  const noteEl = document.getElementById('orderNote');
  const name = (nameEl.value||'').trim();
  const contact = (contactEl.value||'').trim();
  const note = (noteEl.value||'').trim();

  if(!name || !contact){
    setOrderStatus('Compila nome e contatto prima di inviare.', 'error');
    if(!name) nameEl.focus(); else contactEl.focus();
    return;
  }
  if(ORDER_ENDPOINT_URL.indexOf('INSERISCI_QUI') !== -1){
    setOrderStatus('Invio non ancora configurato (manca l\'URL dello script). Usa "Esporta SVG" per ora.', 'error');
    return;
  }

  const warnings = computeAllWarnings();
  if(warnings.length>0){
    const oob = warnings.filter(w=>w.outOfBounds).length;
    const hole = warnings.filter(w=>w.hitsHole).length;
    const parts = [];
    if(oob) parts.push(`${oob} elemento${oob>1?'i':''} fuori dalla tag`);
    if(hole) parts.push(`${hole} elemento${hole>1?'i':''} sul foro`);
    if(!confirm(`Attenzione: ${parts.join(' e ')}. Inviare comunque?`)) return;
  }

  const btn = document.getElementById('sendOrderBtn');
  if(btn){ btn.disabled = true; }
  setOrderStatus('Invio in corso…', '');
  try{
    const svg = await buildExportSVGString();
    const config = { dialProject: true, version: 1, ...currentPayload() };
    const payload = { secret: ORDER_SHARED_SECRET, name, contact, note, svg, config };
    const res = await fetch(ORDER_ENDPOINT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // evita il preflight CORS
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if(data && data.ok){
      setOrderStatus('La tua tag è in preparazione, stay toon!! ✨', 'success');
      nameEl.disabled = true; contactEl.disabled = true; noteEl.disabled = true;
      if(btn){ btn.textContent = 'Inviata ✓'; }
    } else {
      setOrderStatus('Invio non riuscito' + (data && data.error ? ` (${data.error})` : '') + '. Riprova.', 'error');
      if(btn){ btn.disabled = false; }
    }
  } catch(err){
    console.error('Invio ordine fallito', err);
    setOrderStatus('Invio non riuscito. Controlla la connessione e riprova.', 'error');
    if(btn){ btn.disabled = false; }
  }
}

document.getElementById('newProjectLink').addEventListener('click', ()=>{
  if(!confirm('Vuoi ricominciare da zero? Le modifiche non salvate andranno perse.')) return;

document.addEventListener('keydown', e=>{
  const activeTag = (document.activeElement && document.activeElement.tagName) || '';
  const typing = activeTag==='TEXTAREA' || activeTag==='INPUT' || activeTag==='SELECT';
  const mod = e.ctrlKey || e.metaKey;

  // Annulla/ripeti: valide ovunque, come nelle altre app
  if(mod && e.key.toLowerCase()==='z'){
    e.preventDefault();
    if(e.shiftKey) redoNext(); else undoLast();
    return;
  }
  if(mod && e.key.toLowerCase()==='y'){
    e.preventDefault();
    redoNext();
    return;
  }
  if(typing) return; // non interferire con chi sta scrivendo in un campo

  if(!state.selectedId) return;
  const el = state.elements.find(x=>x.id===state.selectedId);
  if(!el || !el.placed) return;

  if(e.key==='Delete' || e.key==='Backspace'){
    e.preventDefault();
    state.elements = state.elements.filter(x=>x.id!==el.id);
    state.selectedId = null;
    renderOrbit();
    return;
  }
  const arrows = { ArrowUp:[0,-1], ArrowDown:[0,1], ArrowLeft:[-1,0], ArrowRight:[1,0] };
  const dir = arrows[e.key];
  if(dir){
    e.preventDefault();
    const step = e.shiftKey ? 10 : (state.gridOn ? GRID_STEP : 1);
    el.x = snapVal(el.x + dir[0]*step);
    el.y = snapVal(el.y + dir[1]*step);
    const svg = document.getElementById('tagSvg');
    const g = svg && svg.querySelector(`[data-id="${el.id}"]`);
    if(g) g.setAttribute('transform', `translate(${el.x},${el.y}) rotate(${el.rotation||0})`);
    updateBoundsWarning();
    pushHistory();
    saveProject();
  }
});
